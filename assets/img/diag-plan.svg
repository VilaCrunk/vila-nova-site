<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" fill="none">
  <!-- régua de tempo (timeline) -->
  <g stroke="#3c3220" stroke-opacity="0.16">
    <line x1="40" y1="54" x2="900" y2="54"/>
    <line x1="40" y1="48" x2="40" y2="60"/>
    <line x1="140" y1="48" x2="140" y2="60"/>
    <line x1="240" y1="48" x2="240" y2="60"/>
    <line x1="340" y1="48" x2="340" y2="60"/>
    <line x1="440" y1="48" x2="440" y2="60"/>
    <line x1="540" y1="48" x2="540" y2="60"/>
    <line x1="640" y1="48" x2="640" y2="60"/>
    <line x1="740" y1="48" x2="740" y2="60"/>
    <line x1="840" y1="48" x2="840" y2="60"/>
  </g>
  <g fill="#3c3220" fill-opacity="0.20" font-family="Hanken Grotesk, sans-serif" font-size="10" letter-spacing="1.5">
    <text x="44" y="38">S1</text>
    <text x="144" y="38">S2</text>
    <text x="244" y="38">S3</text>
    <text x="344" y="38">S4</text>
    <text x="444" y="38">S5</text>
    <text x="544" y="38">S6</text>
    <text x="644" y="38">S7</text>
    <text x="744" y="38">S8</text>
    <text x="844" y="38">S9</text>
  </g>

  <!-- guias de linha do cronograma (horizontais, discretas) -->
  <g stroke="#3c3220" stroke-opacity="0.05">
    <line x1="40" y1="97" x2="900" y2="97"/>
    <line x1="40" y1="139" x2="900" y2="139"/>
    <line x1="40" y1="181" x2="900" y2="181"/>
    <line x1="40" y1="223" x2="900" y2="223"/>
    <line x1="40" y1="265" x2="900" y2="265"/>
    <line x1="40" y1="307" x2="900" y2="307"/>
    <line x1="40" y1="349" x2="900" y2="349"/>
  </g>

  <!-- barras de Gantt (escalonadas) -->
  <g>
    <rect x="60"  y="92"  width="190" height="10" rx="5" fill="#9c6a1c" fill-opacity="0.15"/>
    <rect x="160" y="134" width="250" height="10" rx="5" fill="#3c3220" fill-opacity="0.11"/>
    <rect x="100" y="176" width="140" height="10" rx="5" fill="#3c3220" fill-opacity="0.10"/>
    <rect x="230" y="218" width="210" height="10" rx="5" fill="#9c6a1c" fill-opacity="0.13"/>
    <rect x="130" y="260" width="170" height="10" rx="5" fill="#3c3220" fill-opacity="0.10"/>
    <rect x="310" y="302" width="150" height="10" rx="5" fill="#3c3220" fill-opacity="0.09"/>
    <rect x="80"  y="344" width="220" height="10" rx="5" fill="#9c6a1c" fill-opacity="0.12"/>
  </g>

  <!-- marcos (milestones) -->
  <g fill="#9c6a1c" fill-opacity="0.22">
    <path d="M250 97 l7 7 -7 7 -7 -7 z"/>
    <path d="M440 223 l7 7 -7 7 -7 -7 z"/>
    <path d="M300 344 l7 7 -7 7 -7 -7 z"/>
  </g>

  <!-- conectores verticais pontilhados -->
  <g stroke="#9c6a1c" stroke-opacity="0.14" stroke-dasharray="2 4">
    <line x1="250" y1="102" x2="250" y2="134"/>
    <line x1="440" y1="228" x2="440" y2="260"/>
  </g>
</svg>
